<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌻 每日打卡</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: linear-gradient(160deg, #0a0a1a 0%, #12122a 50%, #0d0d20 100%);
  color: #e5e5e5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 20px 14px 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Calendar ── */
.calendar-section {
  background: rgba(21, 21, 42, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  border: 1px solid rgba(124, 58, 237, 0.12);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.calendar-nav-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(124, 58, 237, 0.15);
  color: #a78bfa;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.calendar-nav-btn:active { background: rgba(124, 58, 237, 0.3); }

.calendar-title {
  font-size: 17px;
  font-weight: 600;
  color: #c4b5fd;
  letter-spacing: 0.5px;
}

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  margin-bottom: 4px;
}
.weekday-row span {
  font-size: 12px;
  color: #52527a;
  padding: 4px 0;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  color: #b0b0cc;
  position: relative;
  transition: all 0.15s;
  gap: 1px;
  cursor: pointer;
}
.calendar-day:active { background: rgba(124, 58, 237, 0.15); }
.calendar-day .day-num { font-size: 14px; line-height: 1; }
.calendar-day .day-emoji { font-size: 12px; line-height: 1; }

.calendar-day.other-month { color: #2a2a45; cursor: default; }
.calendar-day.other-month:active { background: transparent; }

.calendar-day.today {
  background: rgba(79, 70, 229, 0.2);
  color: #c4b5fd;
  font-weight: 700;
  box-shadow: inset 0 0 0 2px rgba(124, 58, 237, 0.5);
}

.calendar-day.completed .day-num { color: #fbbf24; font-weight: 700; }
.calendar-day.completed { background: rgba(251, 191, 36, 0.08); }
.calendar-day.completed.today {
  background: rgba(251, 191, 36, 0.12);
  box-shadow: inset 0 0 0 2px rgba(251, 191, 36, 0.5);
}
.calendar-day.viewing {
  background: rgba(124, 58, 237, 0.25);
  box-shadow: inset 0 0 0 2px #7c3aed;
}

/* ── Today Section ── */
.today-section { margin-bottom: 6px; }

.today-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.today-date { font-size: 14px; color: #8b8ba7; font-weight: 450; }
.today-date .view-hint { color: #7c3aed; font-weight: 600; }
.today-status { font-size: 14px; font-weight: 600; color: #a78bfa; }

.streak-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(251, 191, 36, 0.1);
  border: 1px solid rgba(251, 191, 36, 0.2);
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: #fbbf24;
  font-weight: 600;
}

.today-btn {
  padding: 3px 12px;
  border: 1px solid rgba(124, 58, 237, 0.3);
  background: rgba(124, 58, 237, 0.1);
  color: #a78bfa;
  border-radius: 14px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.12s;
  font-weight: 500;
}
.today-btn:active { background: rgba(124, 58, 237, 0.2); }

.progress-bar {
  height: 3px;
  background: rgba(31, 31, 58, 0.8);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 10px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}
.progress-fill.done { background: linear-gradient(90deg, #fbbf24, #f59e0b); }

/* ── Habit List ── */
main { flex: 1; }
.habit-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

.habit-item {
  display: flex;
  align-items: center;
  padding: 15px 16px;
  background: rgba(21, 21, 42, 0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 14px;
  gap: 14px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  border: 1px solid rgba(124, 58, 237, 0.06);
}
.habit-item:active { background: rgba(30, 30, 55, 0.9); }
.habit-item.completed { border-color: rgba(251, 191, 36, 0.15); }

.habit-check {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 20px;
  transition: all 0.25s;
  background: rgba(31, 31, 58, 0.7);
  border: 2px solid rgba(45, 45, 80, 0.5);
}
.habit-item.completed .habit-check {
  background: rgba(31, 31, 42, 0.8);
  border-color: #fbbf24;
  animation: sunflower-pop 0.4s ease;
}

@keyframes sunflower-pop {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.habit-check .empty-icon { color: rgba(74, 74, 106, 0.7); font-size: 14px; }
.habit-item.completed .habit-check .empty-icon { display: none; }

.habit-name {
  flex: 1;
  font-size: 16px;
  font-weight: 450;
  transition: color 0.25s;
  min-width: 0;
  word-break: break-word;
  color: #d4d4f5;
}
.habit-item.completed .habit-name { color: rgba(107, 107, 138, 0.7); text-decoration: line-through; }

.habit-delete {
  width: 30px;
  height: 30px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: rgba(58, 58, 90, 0.6);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: all 0.12s;
  flex-shrink: 0;
  padding: 0;
}
.habit-delete:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

/* ── Add Form ── */
footer {
  padding-top: 10px;
  padding-bottom: 24px;
  position: sticky;
  bottom: 0;
  background: #0d0d1a;
}

.add-form { display: flex; gap: 8px; }
.add-form input {
  flex: 1;
  padding: 14px 16px;
  border: 2px solid rgba(31, 31, 58, 0.8);
  border-radius: 14px;
  font-size: 16px;
  outline: none;
  transition: all 0.2s;
  font-family: inherit;
  background: rgba(21, 21, 42, 0.7);
  color: #e5e5e5;
}
.add-form input:focus { border-color: rgba(124, 58, 237, 0.6); }
.add-form input::placeholder { color: rgba(74, 74, 106, 0.6); }

.add-form button {
  width: 52px;
  height: 52px;
  border: none;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff;
  font-size: 28px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
}
.add-form button:active { transform: scale(0.94); }

/* ── Empty State ── */
.empty-state { text-align: center; padding: 48px 20px; color: rgba(74, 74, 106, 0.7); font-size: 15px; line-height: 1.6; }

/* ── Celebration ── */
.celebration-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 26, 0.94);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  animation: fade-in 0.4s ease;
}
.celebration-overlay.show { display: flex; }

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.celebration-content {
  text-align: center;
  animation: celebration-bounce 0.6s ease;
  padding: 20px;
}

@keyframes celebration-bounce {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}

.celebration-sunflower { font-size: 72px; display: block; margin-bottom: 10px; animation: sunflower-wiggle 2s ease infinite; }

@keyframes sunflower-wiggle {
  0%, 100% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(8deg) scale(1.08); }
  75% { transform: rotate(-8deg) scale(1.08); }
}

.celebration-title { font-size: 34px; font-weight: 700; color: #fbbf24; margin-bottom: 6px; }
.celebration-streak { font-size: 20px; color: #a78bfa; margin-top: 10px; font-weight: 600; }
.celebration-streak span { color: #fbbf24; }
.celebration-date { font-size: 15px; color: rgba(139, 139, 167, 0.7); margin-top: 4px; }

#confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 101; }

.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(31, 31, 58, 0.95);
  backdrop-filter: blur(10px);
  color: #d4d4f5;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
  border: 1px solid rgba(124, 58, 237, 0.15);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 400px) {
  .container { padding: 14px 10px 0; }
  .calendar-section { padding: 12px; }
  .habit-item { padding: 13px 14px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Calendar -->
  <div class="calendar-section">
    <div class="calendar-header">
      <button class="calendar-nav-btn" id="prevMonth">‹</button>
      <span class="calendar-title" id="calendarTitle">2026年6月</span>
      <button class="calendar-nav-btn" id="nextMonth">›</button>
    </div>
    <div class="weekday-row">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <!-- Today section -->
  <div class="today-section">
    <div class="today-header">
      <span class="today-date" id="todayDate"></span>
      <span class="today-status" id="todayStatus">0/0</span>
    </div>
    <div class="streak-row" id="streakRow">
      <span class="streak-badge" id="streakBadge">🔥 连续 0 天</span>
      <button class="today-btn" id="todayBtn" style="display:none">回到今天</button>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Habit List -->
  <main>
    <ul class="habit-list" id="habitList"></ul>
  </main>

  <!-- Add Habit -->
  <footer>
    <div class="add-form">
      <input type="text" id="habitInput" placeholder="添加新习惯" maxlength="50" autocomplete="off">
      <button id="addBtn" title="添加">+</button>
    </div>
  </footer>
</div>

<!-- Celebration -->
<div class="celebration-overlay" id="celebrationOverlay">
  <canvas id="confettiCanvas"></canvas>
  <div class="celebration-content">
    <span class="celebration-sunflower">🌻</span>
    <div class="celebration-title" id="celebTitle">全部完成！</div>
    <div class="celebration-streak" id="celebStreak"></div>
    <div class="celebration-date" id="celebrationDate"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const STORAGE_KEY = 'habit-tracker-data';
  const DEFAULT_HABITS = ['背单词', '学习', '刷题', '听课'];
  const STREAK_MILESTONES = [7, 30, 50, 63, 88];

  const defaultData = {
    habits: DEFAULT_HABITS.map((name) => ({ id: genId(), name, createdAt: getToday() })),
    records: {},
    _shownMilestones: []
  };

  // ── Utilities ──
  function genId() {
    return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
  }

  function getToday() {
    return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
  }

  function getTomorrow() {
    const d = new Date(); d.setDate(d.getDate() + 1);
    return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
  }

  function formatDisplayDate(dateStr) {
    const parts = dateStr.split('-');
    const d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
    const wds = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    return `${+parts[1]}月${+parts[2]}日 · ${wds[d.getDay()]}`;
  }

  function formatChineseDate(dateStr) {
    const parts = dateStr.split('-');
    return `${+parts[1]}月${+parts[2]}日`;
  }

  function getDaysInMonth(year, month) { return new Date(year, month, 0).getDate(); }

  function getFirstDayOfMonth(year, month) {
    const day = new Date(year, month - 1, 1).getDay();
    return day === 0 ? 6 : day - 1;
  }

  function dateBefore(dateStr) {
    const d = new Date(+dateStr.split('-')[0], +dateStr.split('-')[1] - 1, +dateStr.split('-')[2]);
    d.setDate(d.getDate() - 1);
    return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
  }

  function dateAfter(dateStr) {
    const d = new Date(+dateStr.split('-')[0], +dateStr.split('-')[1] - 1, +dateStr.split('-')[2]);
    d.setDate(d.getDate() + 1);
    return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
  }

  function makeDefaultHabits() {
    return DEFAULT_HABITS.map((name) => ({ id: genId(), name, createdAt: getToday() }));
  }

  // ── Data migration ──
  function migrateData(data) {
    let changed = false;

    // Old format: habits = ['背单词', ...]
    if (data.habits.length > 0 && typeof data.habits[0] === 'string') {
      console.log('Migrating habits from string[] to object[]');
      const today = getToday();
      data.habits = data.habits.map((name) => ({ id: genId(), name, createdAt: today }));
      changed = true;
    }

    // Old format: records = { 'date': [true, false, ...] }
    for (const [date, val] of Object.entries(data.records)) {
      if (Array.isArray(val)) {
        console.log('Migrating records for', date);
        const obj = {};
        val.forEach((done, idx) => {
          if (idx < data.habits.length) {
            obj[data.habits[idx].id] = done;
          }
        });
        data.records[date] = obj;
        changed = true;
      }
    }

    return changed;
  }

  // ── Data ──
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        const data = JSON.parse(JSON.stringify(defaultData));
        saveData(data);
        return data;
      }
      const data = JSON.parse(raw);
      if (!Array.isArray(data.habits)) data.habits = makeDefaultHabits();
      if (!data.records || typeof data.records !== 'object') data.records = {};
      if (!Array.isArray(data._shownMilestones)) data._shownMilestones = [];

      if (migrateData(data)) saveData(data);
      return data;
    } catch {
      return JSON.parse(JSON.stringify(defaultData));
    }
  }

  function saveData(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  }

  function getDateRecords(data, dateStr) {
    if (!data.records[dateStr] || typeof data.records[dateStr] !== 'object') {
      data.records[dateStr] = {};
      saveData(data);
    }
    return data.records[dateStr];
  }

  function isDayComplete(data, dateStr) {
    const recs = data.records[dateStr];
    if (!recs || typeof recs !== 'object') return false;
    // Check if all habits that existed on that date are completed
    const habitsAtDate = data.habits.filter(h => h.createdAt <= dateStr && (!h.deletedAt || h.deletedAt > dateStr));
    if (habitsAtDate.length === 0) return false;
    return habitsAtDate.every(h => recs[h.id] === true);
  }

  function calculateStreak(data) {
    let streak = 0;
    let cur = getToday();
    while (true) {
      const recs = data.records[cur];
      const habitsAtDate = data.habits.filter(h => h.createdAt <= cur && (!h.deletedAt || h.deletedAt > cur));
      if (!recs || habitsAtDate.length === 0) break;
      const allDone = habitsAtDate.every(h => recs[h.id] === true);
      if (!allDone) break;
      streak++;
      cur = dateBefore(cur);
    }
    return streak;
  }

  function isStreakMilestone(streak) {
    if (STREAK_MILESTONES.includes(streak)) return streak;
    if (streak >= 100 && streak % 100 === 0) return streak;
    return null;
  }

  // ── State ──
  let currentMonth = new Date();
  let currentViewDate = null;

  function getViewDate(data) {
    return currentViewDate || data._viewDate || getToday();
  }

  // ── Confetti ──
  let confettiAnimId = null;

  function startConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#fbbf24','#eab308','#a78bfa','#7c3aed','#f59e0b','#d4d4f5','#f97316','#34d399'];
    const particles = Array.from({ length: 150 }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
      w: 5 + Math.random() * 7, h: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: 2 + Math.random() * 3.5, vx: (Math.random() - 0.5) * 1.8,
      rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 8,
      opacity: 0.7 + Math.random() * 0.3
    }));
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const p of particles) {
        p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
        if (p.y < canvas.height + 20) {
          alive = true; ctx.save(); ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180); ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
        }
      }
      if (alive) confettiAnimId = requestAnimationFrame(animate);
    }
    animate();
  }

  function stopConfetti() {
    if (confettiAnimId) { cancelAnimationFrame(confettiAnimId); confettiAnimId = null; }
    const canvas = document.getElementById('confettiCanvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  // ── Celebration ──
  let celebrationTimer = null;

  function showCelebration(dateStr, streak) {
    const overlay = document.getElementById('celebrationOverlay');
    document.getElementById('celebrationDate').textContent = formatChineseDate(dateStr);
    const streakEl = document.getElementById('celebStreak');
    const titleEl = document.getElementById('celebTitle');
    const milestone = isStreakMilestone(streak);
    if (milestone) {
      streakEl.textContent = `🎉 连续打卡 ${milestone} 天！太棒了！`;
      titleEl.textContent = '全部完成！';
    } else if (streak > 0) {
      streakEl.textContent = `🔥 已连续打卡 ${streak} 天`;
      titleEl.textContent = '全部完成！';
    } else {
      streakEl.textContent = '';
      titleEl.textContent = '全部完成！';
    }
    overlay.classList.add('show');
    startConfetti();
    clearTimeout(celebrationTimer);
    celebrationTimer = setTimeout(() => {
      overlay.classList.remove('show');
      stopConfetti();
      if (!currentViewDate) {
        const d = loadData();
        d._viewDate = getTomorrow();
        saveData(d);
        render();
      }
    }, 3500);
  }

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Render Calendar ──
  function renderCalendar(data) {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth() + 1;
    const today = getToday();
    const viewDate = getViewDate(data);

    document.getElementById('calendarTitle').textContent = `${year}年${month}月`;

    const daysInMonth = getDaysInMonth(year, month);
    const startOffset = getFirstDayOfMonth(year, month);
    const prevMonthDays = getDaysInMonth(year, month - 1 || 12);

    let html = '';

    for (let i = startOffset - 1; i >= 0; i--) {
      const day = prevMonthDays - i;
      const m = month === 1 ? 12 : month - 1;
      const y = month === 1 ? year - 1 : year;
      const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      html += `<div class="calendar-day other-month${isDayComplete(data,dateStr)?' completed':''}" data-date="${dateStr}"><span class="day-num">${day}</span>${isDayComplete(data,dateStr)?'<span class="day-emoji">🌻</span>':''}</div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isToday = dateStr === today;
      const complete = isDayComplete(data, dateStr);
      const isViewing = dateStr === viewDate;
      let cls = 'calendar-day';
      if (isToday) cls += ' today';
      if (complete) cls += ' completed';
      if (isViewing && !isToday) cls += ' viewing';
      html += `<div class="${cls}" data-date="${dateStr}"><span class="day-num">${day}</span>${complete?'<span class="day-emoji">🌻</span>':''}</div>`;
    }

    const totalCells = startOffset + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let day = 1; day <= remaining; day++) {
      const m = month === 12 ? 1 : month + 1;
      const y = month === 12 ? year + 1 : year;
      const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      html += `<div class="calendar-day other-month${isDayComplete(data,dateStr)?' completed':''}" data-date="${dateStr}"><span class="day-num">${day}</span>${isDayComplete(data,dateStr)?'<span class="day-emoji">🌻</span>':''}</div>`;
    }

    document.getElementById('calendarGrid').innerHTML = html;
  }

  // ── Main Render ──
  function render() {
    const data = loadData();
    const today = getToday();
    const viewDate = getViewDate(data);
    const isToday = viewDate === today;
    const recs = getDateRecords(data, viewDate);

    // Get habits that existed on viewDate
    const habitsAtDate = data.habits.filter(h => h.createdAt <= viewDate && (!h.deletedAt || h.deletedAt > viewDate));

    // Date
    document.getElementById('todayDate').innerHTML = isToday
      ? formatDisplayDate(today)
      : `${formatDisplayDate(viewDate)} <span class="view-hint">· 查看中</span>`;

    document.getElementById('todayBtn').style.display = isToday ? 'none' : 'inline-block';

    // Stats
    const completed = habitsAtDate.filter(h => recs[h.id] === true).length;
    const total = habitsAtDate.length;
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

    document.getElementById('todayStatus').textContent = total > 0 ? `${completed}/${total}` : '0/0';
    const fill = document.getElementById('progressFill');
    fill.style.width = `${pct}%`;
    fill.className = 'progress-fill' + (pct === 100 && total > 0 ? ' done' : '');

    // Streak
    document.getElementById('streakBadge').textContent = `🔥 连续 ${calculateStreak(data)} 天`;

    // Calendar
    renderCalendar(data);

    // Celebration (today only)
    if (isToday && total > 0 && completed === total && !data._celebratedToday) {
      data._celebratedToday = true;
      saveData(data);
      showCelebration(today, calculateStreak(data));
    }
    if (isToday && total > 0 && completed < total && data._celebratedToday) {
      data._celebratedToday = false;
      saveData(data);
    }

    // Habit list
    const list = document.getElementById('habitList');
    if (habitsAtDate.length === 0) {
      list.innerHTML = '<li class="empty-state">还没有习惯<br>在下方添加吧</li>';
      return;
    }

    list.innerHTML = habitsAtDate.map((h) => {
      const done = recs[h.id] === true;
      return `<li class="habit-item${done?' completed':''}" data-id="${h.id}">
        <div class="habit-check">${done?'🌻':'<span class="empty-icon">○</span>'}</div>
        <span class="habit-name">${escapeHTML(h.name)}</span>
        <button class="habit-delete" data-action="delete" title="删除此习惯">✕</button>
      </li>`;
    }).join('');
  }

  // ── Actions ──

  function getTargetDate() {
    const data = loadData();
    return currentViewDate || data._viewDate || getToday();
  }

  function toggleHabit(habitId) {
    const data = loadData();
    const target = getTargetDate();
    if (!data.records[target] || typeof data.records[target] !== 'object') data.records[target] = {};
    data.records[target][habitId] = !data.records[target][habitId];
    data._celebratedToday = false;
    if (target === getToday()) delete data._viewDate;
    saveData(data);
    render();
  }

  function addHabit(name) {
    const trimmed = name.trim();
    if (!trimmed) return;
    const data = loadData();
    if (data.habits.some(h => h.name === trimmed)) { showToast('已存在相同习惯'); return; }
    const today = getToday();
    data.habits.push({ id: genId(), name: trimmed, createdAt: today });
    // Only add to today's and future records
    Object.keys(data.records).forEach(date => {
      if (date >= today) {
        // future dates that already exist: do nothing, new habit defaults to unchecked
        // (getDateRecords will return undefined for this id, which renders as unchecked)
      }
    });
    saveData(data);
    render();
    document.getElementById('habitInput').value = '';
    document.getElementById('habitInput').focus();
  }

  function deleteHabit(habitId) {
    if (!confirm('确定删除这个习惯吗？')) return;
    const data = loadData();
    const habit = data.habits.find(h => h.id === habitId);
    if (!habit) return;
    // Only mark as deleted for future dates, keep past records intact
    habit.deletedAt = getToday();
    const today = getToday();
    // Remove from today's record display (keep past records)
    Object.keys(data.records).forEach(date => {
      if (date >= today) {
        delete data.records[date][habitId];
        if (Object.keys(data.records[date]).length === 0) delete data.records[date];
      }
    });
    saveData(data);
    render();
  }

  function goToDate(dateStr) {
    currentViewDate = dateStr;
    const parts = dateStr.split('-');
    currentMonth = new Date(+parts[0], +parts[1] - 1, 1);
    render();
  }

  // ── Events ──
  document.getElementById('habitList').addEventListener('click', function(e) {
    const item = e.target.closest('.habit-item');
    if (!item) return;
    const id = item.dataset.id;
    if (e.target.closest('.habit-delete')) { deleteHabit(id); }
    else { toggleHabit(id); }
  });

  document.getElementById('addBtn').addEventListener('click', function() {
    addHabit(document.getElementById('habitInput').value);
  });
  document.getElementById('habitInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addHabit(this.value); }
  });

  document.getElementById('prevMonth').addEventListener('click', function() {
    currentMonth.setMonth(currentMonth.getMonth() - 1);
    renderCalendar(loadData());
  });
  document.getElementById('nextMonth').addEventListener('click', function() {
    currentMonth.setMonth(currentMonth.getMonth() + 1);
    renderCalendar(loadData());
  });

  document.getElementById('calendarGrid').addEventListener('click', function(e) {
    const dayEl = e.target.closest('.calendar-day');
    if (!dayEl || dayEl.classList.contains('other-month')) return;
    const dateStr = dayEl.dataset.date;
    if (dateStr) goToDate(dateStr);
  });

  document.getElementById('todayBtn').addEventListener('click', function() {
    currentViewDate = null;
    const data = loadData();
    delete data._viewDate;
    saveData(data);
    const today = getToday();
    const parts = today.split('-');
    currentMonth = new Date(+parts[0], +parts[1] - 1, 1);
    render();
  });

  document.getElementById('celebrationOverlay').addEventListener('click', function() {
    this.classList.remove('show');
    stopConfetti();
    clearTimeout(celebrationTimer);
    if (!currentViewDate) {
      const d = loadData();
      d._viewDate = getTomorrow();
      saveData(d);
      render();
    }
  });

  // ── Init ──
  const initData = loadData();
  const today = getToday();
  if (initData._viewDate && initData._viewDate < today) {
    delete initData._viewDate;
    saveData(initData);
  }
  render();
})();
</script>

</body>
</html>
