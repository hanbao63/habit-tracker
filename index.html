<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌻 每日打卡</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0d0d1a;
  color: #e5e5e5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 24px 16px 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Calendar ── */
.calendar-section {
  background: #15152a;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.calendar-title {
  font-size: 17px;
  font-weight: 600;
  color: #d4d4f5;
}

.calendar-nav {
  display: flex;
  gap: 4px;
}

.calendar-nav button {
  width: 32px;
  height: 32px;
  border: none;
  background: #1f1f3a;
  color: #a78bfa;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.calendar-nav button:active { background: #2d2d50; }

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  margin-bottom: 6px;
}

.weekday-row span {
  font-size: 12px;
  color: #6b6b8a;
  padding: 4px 0;
  font-weight: 500;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  color: #b0b0cc;
  position: relative;
  transition: background 0.15s;
  gap: 1px;
}

.calendar-day .day-num {
  font-size: 14px;
  line-height: 1;
}

.calendar-day .day-emoji {
  font-size: 11px;
  line-height: 1;
}

.calendar-day.other-month {
  color: #3a3a55;
}

.calendar-day.today {
  background: #1f1f40;
  color: #d4d4f5;
  font-weight: 600;
  box-shadow: 0 0 0 2px #4f46e5;
}

.calendar-day.today.completed {
  box-shadow: 0 0 0 2px #eab308;
  background: #1f1f35;
}

.calendar-day.completed {
  color: #fbbf24;
}

/* ── Today Section ── */
.today-section {
  margin-bottom: 12px;
}

.today-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 6px;
}

.today-date {
  font-size: 13px;
  color: #8b8ba7;
}

.today-status {
  font-size: 14px;
  font-weight: 600;
  color: #a78bfa;
}

/* Progress */
.progress-bar {
  height: 4px;
  background: #1f1f3a;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #a78bfa, #eab308);
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

/* ── Habit List ── */
main { flex: 1; }

.habit-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.habit-item {
  display: flex;
  align-items: center;
  padding: 16px 16px;
  background: #15152a;
  border-radius: 14px;
  gap: 14px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  border: 1px solid transparent;
}

.habit-item:active { background: #1c1c35; }
.habit-item.completed { border-color: #2d2d15; }

/* Sunflower checkbox */
.habit-check {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 20px;
  transition: all 0.25s;
  background: #1f1f3a;
  border: 2px solid #2d2d50;
}

.habit-item.completed .habit-check {
  background: #1f1f2a;
  border-color: #eab308;
  animation: sunflower-pop 0.4s ease;
}

@keyframes sunflower-pop {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.habit-check .empty-icon {
  color: #4a4a6a;
  font-size: 14px;
}

.habit-item.completed .habit-check .empty-icon {
  display: none;
}

.habit-name {
  flex: 1;
  font-size: 16px;
  font-weight: 450;
  transition: color 0.25s;
  min-width: 0;
  word-break: break-word;
  color: #d4d4f5;
}

.habit-item.completed .habit-name {
  color: #6b6b8a;
  text-decoration: line-through;
}

.habit-delete {
  width: 30px;
  height: 30px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: #3a3a5a;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: all 0.12s;
  flex-shrink: 0;
  padding: 0;
}

.habit-delete:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

/* ── Add Form ── */
footer {
  padding-top: 12px;
  padding-bottom: 28px;
  position: sticky;
  bottom: 0;
  background: #0d0d1a;
}

.add-form {
  display: flex;
  gap: 8px;
}

.add-form input {
  flex: 1;
  padding: 14px 16px;
  border: 2px solid #1f1f3a;
  border-radius: 14px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
  background: #15152a;
  color: #e5e5e5;
}

.add-form input:focus {
  border-color: #7c3aed;
}

.add-form input::placeholder {
  color: #4a4a6a;
}

.add-form button {
  width: 52px;
  height: 52px;
  border: none;
  background: #7c3aed;
  color: #fff;
  font-size: 28px;
  font-weight: 300;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.12s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
  padding-bottom: 2px;
}

.add-form button:hover { background: #6d28d9; }
.add-form button:active { transform: scale(0.95); }

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: #4a4a6a;
  font-size: 15px;
  line-height: 1.6;
}

/* ── Celebration Overlay ── */
.celebration-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13, 13, 26, 0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  animation: fade-in 0.3s ease;
}

.celebration-overlay.show {
  display: flex;
}

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.celebration-content {
  text-align: center;
  animation: celebration-bounce 0.6s ease;
}

@keyframes celebration-bounce {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.celebration-sunflower {
  font-size: 80px;
  display: block;
  margin-bottom: 12px;
  animation: sunflower-spin 2s ease infinite;
}

@keyframes sunflower-spin {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(10deg) scale(1.1); }
  50% { transform: rotate(0deg) scale(1); }
  75% { transform: rotate(-10deg) scale(1.1); }
  100% { transform: rotate(0deg) scale(1); }
}

.celebration-title {
  font-size: 36px;
  font-weight: 700;
  color: #fbbf24;
  margin-bottom: 8px;
}

.celebration-date {
  font-size: 16px;
  color: #8b8ba7;
}

.celebration-sub {
  font-size: 14px;
  color: #6b6b8a;
  margin-top: 20px;
}

/* ── Confetti Canvas ── */
#confettiCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 101;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1f1f3a;
  color: #d4d4f5;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
  border: 1px solid #2d2d50;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .container { padding: 16px 12px 0; }
  .calendar-section { padding: 12px; }
  .calendar-day { font-size: 13px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Calendar -->
  <div class="calendar-section">
    <div class="calendar-header">
      <span class="calendar-title" id="calendarTitle">2026年6月</span>
      <div class="calendar-nav">
        <button id="prevMonth">‹</button>
        <button id="nextMonth">›</button>
      </div>
    </div>
    <div class="weekday-row">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <!-- Today -->
  <div class="today-section">
    <div class="today-header">
      <span class="today-date" id="todayDate"></span>
      <span class="today-status" id="todayStatus">已完成 0/0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Habit List -->
  <main>
    <ul class="habit-list" id="habitList"></ul>
  </main>

  <!-- Add Habit -->
  <footer>
    <div class="add-form">
      <input type="text" id="habitInput" placeholder="添加新习惯" maxlength="50" autocomplete="off">
      <button id="addBtn" title="添加">+</button>
    </div>
  </footer>
</div>

<!-- Celebration -->
<div class="celebration-overlay" id="celebrationOverlay">
  <canvas id="confettiCanvas"></canvas>
  <div class="celebration-content">
    <span class="celebration-sunflower">🌻</span>
    <div class="celebration-title">全部完成！</div>
    <div class="celebration-date" id="celebrationDate"></div>
    <div class="celebration-sub">明天继续加油 🌻</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const STORAGE_KEY = 'habit-tracker-data';
  const DEFAULT_HABITS = ['背单词', '学习', '刷题', '听课'];

  const defaultData = {
    habits: [...DEFAULT_HABITS],
    records: {}
  };

  // ── Date utils ──
  function getToday() {
    return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
  }

  function getTomorrow() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
  }

  function formatDisplayDate(dateStr) {
    const parts = dateStr.split('-');
    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    return `${parseInt(parts[1])}月${parseInt(parts[2])}日 · ${weekdays[d.getDay()]}`;
  }

  function formatChineseDate(dateStr) {
    const parts = dateStr.split('-');
    return `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
  }

  function getDaysInMonth(year, month) {
    return new Date(year, month, 0).getDate();
  }

  function getFirstDayOfMonth(year, month) {
    // Returns 0=Sun, 1=Mon, ... 6=Sat
    const day = new Date(year, month - 1, 1).getDay();
    // Convert to Mon=0, Tue=1, ... Sun=6
    return day === 0 ? 6 : day - 1;
  }

  // ── Data ──
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return JSON.parse(JSON.stringify(defaultData));
      const data = JSON.parse(raw);
      if (!Array.isArray(data.habits)) data.habits = [...DEFAULT_HABITS];
      if (!data.records || typeof data.records !== 'object') data.records = {};
      return data;
    } catch {
      return JSON.parse(JSON.stringify(defaultData));
    }
  }

  function saveData(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  }

  function getTodayRecords(data, today) {
    if (!data.records[today]) {
      data.records[today] = data.habits.map(() => false);
      saveData(data);
    }
    return data.records[today];
  }

  function isDayComplete(data, dateStr) {
    const recs = data.records[dateStr];
    if (!recs || recs.length === 0) return false;
    return recs.every(Boolean);
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── State ──
  let currentMonth = new Date();

  // ── Confetti ──
  let confettiAnimId = null;

  function startConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#fbbf24', '#eab308', '#a78bfa', '#7c3aed', '#f59e0b', '#d4d4f5', '#f97316'];
    const particles = Array.from({ length: 120 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: 6 + Math.random() * 6,
      h: 4 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: 2 + Math.random() * 3,
      vx: (Math.random() - 0.5) * 1.5,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 6,
      opacity: 0.8 + Math.random() * 0.2
    }));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const p of particles) {
        p.y += p.vy;
        p.x += p.vx;
        p.rot += p.rotSpeed;
        if (p.y < canvas.height + 20) {
          alive = true;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }
      }
      if (alive) {
        confettiAnimId = requestAnimationFrame(animate);
      }
    }
    animate();
  }

  function stopConfetti() {
    if (confettiAnimId) {
      cancelAnimationFrame(confettiAnimId);
      confettiAnimId = null;
    }
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ── Celebration ──
  let celebrationTimer = null;

  function showCelebration(dateStr) {
    const overlay = document.getElementById('celebrationOverlay');
    document.getElementById('celebrationDate').textContent = formatChineseDate(dateStr);
    overlay.classList.add('show');
    startConfetti();

    clearTimeout(celebrationTimer);
    celebrationTimer = setTimeout(() => {
      overlay.classList.remove('show');
      stopConfetti();
      // Auto-advance to tomorrow
      const d = loadData();
      d._viewDate = getTomorrow();
      saveData(d);
      render();
    }, 3500);
  }

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  // ── Render Calendar ──
  function renderCalendar(data) {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth() + 1;
    const today = getToday();

    document.getElementById('calendarTitle').textContent = `${year}年${month}月`;

    const daysInMonth = getDaysInMonth(year, month);
    const startOffset = getFirstDayOfMonth(year, month);
    const prevMonthDays = getDaysInMonth(year, month - 1 || 12);

    const grid = document.getElementById('calendarGrid');
    let html = '';

    // Previous month days
    for (let i = startOffset - 1; i >= 0; i--) {
      const day = prevMonthDays - i;
      const m = month === 1 ? 12 : month - 1;
      const y = month === 1 ? year - 1 : year;
      const dateStr = `${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const complete = isDayComplete(data, dateStr);
      html += `<div class="calendar-day other-month${complete ? ' completed' : ''}">`;
      html += `<span class="day-num">${day}</span>`;
      if (complete) html += `<span class="day-emoji">🌻</span>`;
      html += `</div>`;
    }

    // Current month days
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const isToday = dateStr === today;
      const complete = isDayComplete(data, dateStr);

      let cls = 'calendar-day';
      if (isToday) cls += ' today';
      if (complete) cls += ' completed';

      html += `<div class="${cls}" data-date="${dateStr}">`;
      html += `<span class="day-num">${day}</span>`;
      if (complete) html += `<span class="day-emoji">🌻</span>`;
      html += `</div>`;
    }

    // Next month days to fill grid
    const totalCells = startOffset + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let day = 1; day <= remaining; day++) {
      const m = month === 12 ? 1 : month + 1;
      const y = month === 12 ? year + 1 : year;
      const dateStr = `${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const complete = isDayComplete(data, dateStr);
      html += `<div class="calendar-day other-month${complete ? ' completed' : ''}">`;
      html += `<span class="day-num">${day}</span>`;
      if (complete) html += `<span class="day-emoji">🌻</span>`;
      html += `</div>`;
    }

    grid.innerHTML = html;
  }

  // ── Render Habits ──
  function render() {
    const data = loadData();
    const today = getToday();
    const viewDate = data._viewDate || today;
    const todayRecords = getTodayRecords(data, viewDate);

    // Date
    const isViewingFuture = viewDate !== today;
    document.getElementById('todayDate').textContent = 
      isViewingFuture ? formatDisplayDate(viewDate) : formatDisplayDate(today);

    // Stats
    const completed = todayRecords.filter(Boolean).length;
    const total = data.habits.length;
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

    document.getElementById('todayStatus').textContent =
      total > 0 ? `已完成 ${completed}/${total}` : '还没有习惯';
    document.getElementById('progressFill').style.width = `${pct}%`;

    // Calendar
    renderCalendar(data);

    // Check if all done (just completed)
    const wasAllDone = data.habits.length > 0 && completed === total;
    if (wasAllDone && !data._celebratedToday) {
      data._celebratedToday = true;
      saveData(data);
      showCelebration(today);
    }
    if (!wasAllDone && data._celebratedToday) {
      data._celebratedToday = false;
      saveData(data);
    }

    // List
    const list = document.getElementById('habitList');
    if (data.habits.length === 0) {
      list.innerHTML = '<li class="empty-state">还没有习惯<br>在下方添加吧</li>';
      return;
    }

    list.innerHTML = data.habits.map((habit, i) => {
      const done = todayRecords[i] || false;
      return `<li class="habit-item${done ? ' completed' : ''}" data-index="${i}">
        <div class="habit-check">${done ? '🌻' : '<span class="empty-icon">○</span>'}</div>
        <span class="habit-name">${escapeHTML(habit)}</span>
        <button class="habit-delete" data-action="delete" title="删除此习惯">✕</button>
      </li>`;
    }).join('');
  }

  // ── Actions ──
  function toggleHabit(index) {
    const data = loadData();
    const today = getToday();
    if (!data.records[today]) {
      data.records[today] = data.habits.map(() => false);
    }
    data.records[today][index] = !data.records[today][index];
    // Reset celebration flag so it triggers again if all done
    data._celebratedToday = false;
    saveData(data);
    render();
  }

  function addHabit(name) {
    const trimmed = name.trim();
    if (!trimmed) return;
    const data = loadData();
    if (data.habits.some(h => h === trimmed)) {
      showToast('已存在相同习惯');
      return;
    }
    data.habits.push(trimmed);
    const today = getToday();
    if (data.records[today]) {
      data.records[today].push(false);
    }
    saveData(data);
    render();
    document.getElementById('habitInput').value = '';
    document.getElementById('habitInput').focus();
  }

  function deleteHabit(index) {
    if (!confirm('确定删除这个习惯吗？')) return;
    const data = loadData();
    data.habits.splice(index, 1);
    Object.keys(data.records).forEach(date => {
      if (Array.isArray(data.records[date]) && data.records[date].length > index) {
        data.records[date].splice(index, 1);
        if (data.records[date].length === 0) delete data.records[date];
      }
    });
    saveData(data);
    render();
  }

  // ── Events ──
  document.getElementById('habitList').addEventListener('click', function(e) {
    const item = e.target.closest('.habit-item');
    if (!item) return;
    const index = parseInt(item.dataset.index);
    if (e.target.closest('.habit-delete')) {
      deleteHabit(index);
    } else {
      toggleHabit(index);
    }
  });

  document.getElementById('addBtn').addEventListener('click', function() {
    addHabit(document.getElementById('habitInput').value);
  });

  document.getElementById('habitInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addHabit(this.value); }
  });

  document.getElementById('prevMonth').addEventListener('click', function() {
    currentMonth.setMonth(currentMonth.getMonth() - 1);
    renderCalendar(loadData());
  });

  document.getElementById('nextMonth').addEventListener('click', function() {
    currentMonth.setMonth(currentMonth.getMonth() + 1);
    renderCalendar(loadData());
  });

  // Click on celebration overlay to dismiss early
  document.getElementById('celebrationOverlay').addEventListener('click', function() {
    this.classList.remove('show');
    stopConfetti();
    clearTimeout(celebrationTimer);
    const d = loadData();
    d._viewDate = getTomorrow();
    saveData(d);
    render();
  });

  // ── Init ──
  // Clean up old celebration flag at midnight
  const data = loadData();
  const today = getToday();
  if (data._viewDate && data._viewDate < today) {
    delete data._viewDate;
  }
  if (data._celebratedDate && data._celebratedDate !== today) {
    data._celebratedToday = false;
    delete data._celebratedDate;
  }
  render();
})();
</script>

</body>
</html>
